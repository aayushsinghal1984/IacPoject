name: Build and Push Container Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHUB_TOKEN }}" | podman login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Build Image
        run: |
          podman build \
            -f Dockerfile \
            -t ghcr.io/${{ env.IMAGE_NAME }}:latest \
            -t ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            .

      - name: Push Image
        run: |
          podman push ghcr.io/${{ env.IMAGE_NAME }}:latest
          podman push ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Job Summary
        if: always()
        run: |
          echo "# Container Build & Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ghcr.io/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:** latest, sha-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** ghcr.io" >> $GITHUB_STEP_SUMMARY