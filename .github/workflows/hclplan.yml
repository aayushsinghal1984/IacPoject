name: HCL Tf Plan

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      working_directory:
        description: "Terraform working directory"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  tf-plan:
    runs-on: self-hosted
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHUB_TOKEN }}" | podman login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Pull Image (only if not present)
        run: |
          if ! podman image exists ghcr.io/aayushsinghal1984/ulseworkflowcontainer:latest; then
            echo "Image not found locally, pulling..."
            podman pull ghcr.io/aayushsinghal1984/ulseworkflowcontainer:latest
          else
            echo "Image already exists locally, skipping pull."
          fi

      - name: Get OIDC Token
        id: oidc
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" \
            | jq -r '.value')
          echo "::add-mask::$OIDC_TOKEN"
          echo "oidc_token=$OIDC_TOKEN" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        shell: bash
        run: |
          set -euo pipefail

          MODULE_PATH="${{ inputs.working_directory }}"
          MODULE_NAME="${{ inputs.working_directory }}"
          ENVIRONMENT="${{ inputs.environment }}"

          echo "-------------------------------------"
          echo "Running Terraform Plan"
          echo "-------------------------------------"
          echo "Working Directory: ${MODULE_PATH}"

          if [ ! -d "${MODULE_PATH}" ]; then
            echo "Directory does not exist: ${MODULE_PATH}"
            exit 1
          fi

          podman run --rm \
            -v "${{ github.workspace }}:/workspace:Z" \
            -w "/workspace/${MODULE_PATH}" \
            -e TF_TOKEN_app_terraform_io="${{ secrets.TF_API_TOKEN }}" \
            -e ARM_CLIENT_ID="${{ secrets.ARM_CLIENT_ID }}" \
            -e ARM_TENANT_ID="${{ secrets.ARM_TENANT_ID }}" \
            -e ARM_SUBSCRIPTION_ID="${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -e ARM_USE_OIDC=true \
            -e ARM_OIDC_TOKEN="${{ steps.oidc.outputs.oidc_token }}" \
            --entrypoint /bin/sh \
            ghcr.io/aayushsinghal1984/ulseworkflowcontainer:latest \
            -c "
              echo 'Terraform Version'
              terraform version

              echo 'Terraform Init'
              terraform init -input=false -no-color

              echo 'Terraform Plan'
              terraform plan \
                -input=false \
                -no-color \
                -out=tfplan

              echo 'Generate JSON Plan'
              terraform show -json tfplan > tfplan.json

              echo 'Validate JSON'
              test -f tfplan.json && echo 'tfplan.json created successfully'
            "

      - name: Copy Plan Files to Artifact Staging
        shell: bash
        run: |
          MODULE_PATH="${{ inputs.working_directory }}"
          STAGING_DIR="${{ github.workspace }}/plan-artifacts"
          mkdir -p "$STAGING_DIR"

          # Files are in workspace because of volume mount
          cp "${{ github.workspace }}/${MODULE_PATH}/tfplan"      "$STAGING_DIR/tfplan"
          cp "${{ github.workspace }}/${MODULE_PATH}/tfplan.json" "$STAGING_DIR/tfplan.json"

          echo "Files staged:"
          ls -lh "$STAGING_DIR"

      - name: Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ github.workspace }}/plan-artifacts/
          retention-days: 7
          if-no-files-found: error

      - name: Job Summary
        if: always()
        shell: bash
        run: |
          MODULE_NAME="${{ inputs.working_directory }}"
          ENVIRONMENT="${{ inputs.environment }}"
          {
            echo "# Terraform Plan Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Module | ${MODULE_NAME} |"
            echo "| Environment | ${ENVIRONMENT} |"
            echo "| Artifact | tfplan-${ENVIRONMENT}-${{ github.run_id }} |"
            echo "| Status | Plan Generated |"
            echo ""
            echo "Plan files generated and uploaded successfully."
            echo "- \`tfplan\` → used by Terraform Apply"
            echo "- \`tfplan.json\` → used by OPA policy evaluation"
          } >> "$GITHUB_STEP_SUMMARY"