name: " docker TFLint"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      working_directory:
        description: "Terraform working directory (relative to repo root)"
        required: false
        default: "."
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  tflint:
    name: "TFLint (${{ inputs.environment }})"
    runs-on: ubuntu-latest   
    container:
      image: ghcr.io/terraform-linters/tflint:latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: TFLint Init
        run: tflint --init

      - name: TFLint Run
        run: |      
          tflint --format compact --recursive > ${{ github.workspace }}/${{ inputs.working_directory }}/tflint-report.txt

      - name: Upload TFLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tflint-report-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tflint-report.txt
          if-no-files-found: error 
