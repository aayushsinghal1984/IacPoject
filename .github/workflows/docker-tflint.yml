name: "Docker TFLint"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        default: "."
        type: string

jobs:
  tflint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/terraform-linters/tflint:latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Debug Workspace Structure
        run: |
          echo "Current Path: $(pwd)"
          echo "Files in Workspace:"
          ls -R 
          echo "Terraform files detected:"
          find . -name "*.tf"

      - name: TFLint Init and Run
        run: |
          tflint --init
          tflint --verbose --format compact --recursive > tflint-report.txt


      - name: Debug TFLint Output
        run: |
          echo "--- TFLint Report Summary ---"
          if [ -s tflint-report.txt ]; then
            echo "Report generated successfully."
            cat tflint-report.txt
          else
            echo "Warning: Report file is empty (0 bytes)."
          fi

      - name: Upload TFLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tflint-report-${{ inputs.environment }}
          path: tflint-report.txt
          if-no-files-found: error
