name: " docker TFLint"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      working_directory:
        description: "Terraform working directory (relative to repo root)"
        required: false
        default: "."
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  tflint:
    name: "TFLint (${{ inputs.environment }})"
    runs-on: ubuntu-latest   
    container:
      image: ghcr.io/terraform-linters/tflint:latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: TFLint Run
        run: |
          tflint --format compact --recursive > tflint-report.txt
          echo "File status:"
          ls -l tflint-report.txt
          cat tflint-report.txt
          
      - name: Debug and List Files
        run: |
            echo "Current Directory: $(pwd)"

      - name: Upload TFLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tflint-report-${{ inputs.environment }}
          path: tflint-report.txt
          if-no-files-found: error
