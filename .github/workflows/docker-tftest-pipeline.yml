name: " docker Terraform Test Pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options: [dev, qa, prod]
      working_directory:
        description: "Terraform working directory"
        required: false
        default: "."
        type: string

permissions:
  id-token: write
  contents: read

jobs:

  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    container:
      image: hashicorp/terraform:1.9.0
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Terraform Init
        run: terraform init -input=false

  terraform-test:
    name: "Terraform Test"
    needs: terraform-plan
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Terraform Test
        run: |
          terraform init -input=false
          terraform test -var-file="environments/${{ inputs.environment }}.tfvars" -verbose 2>&1 | tee test-output.txt

      
