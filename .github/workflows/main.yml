name: "docker terraform apply pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      working_directory:
        description: "Terraform working directory"
        required: false
        default: "."
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  terraform-apply:
    name: "Terraform Apply"
    runs-on: self-hosted
    environment: ${{ inputs.environment }}

    container:
      image: hashicorp/terraform:1.9.0

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: ${{ inputs.environment }}

      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_USE_OIDC: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-json-${{ inputs.environment }}
          
      - name: Debug Files
        run: |
          echo "Workspace content:"
          ls -R .

      - name: Terraform Init
        run: terraform init -input=false


      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve tfplan


      - name: GitHub Step Summary
        if: always()
        run: |
          echo "##  Terraform Apply Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "Directory: ${{ inputs.working_directory }}" >> $GITHUB_STEP_SUMMARY
