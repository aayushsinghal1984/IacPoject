name: HCL TFLint

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      working_directory:
        description: "Terraform working directory"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  lint-tflint:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHUB_TOKEN }}" | podman login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Pull Image (only if not present)
        run: |
          if ! podman image exists ghcr.io/aayushsinghal1984/ulseworkflowcontainer:latest; then
            echo "Image not found locally, pulling..."
            podman pull ghcr.io/aayushsinghal1984/ulseworkflowcontainer:latest
          else
            echo "Image already exists locally, skipping pull."
          fi

      - name: Run TFLint
        shell: bash
        run: |
          set -e
          MODULE_PATH="${{ inputs.working_directory }}"
          echo "Working Directory: $MODULE_PATH"

          if [ ! -d "$MODULE_PATH" ]; then
            echo "Directory does not exist: $MODULE_PATH"
            exit 1
          fi

          podman run --rm \
            -v "${{ github.workspace }}:/workspace:Z" \
            --entrypoint /bin/sh \
            ghcr.io/aayushsinghal1984/ulseworkflowcontainer:latest \
            -c "
            cd /workspace/${MODULE_PATH}
            echo 'Current Directory:'
            pwd
            tflint --version
            echo 'Initializing Plugins...'
            tflint --init
            echo 'Running TFLint...'
            tflint --format compact
            "

          echo ""
          echo "TFLint completed successfully"
          {
            echo "# TFLint Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Module | $MODULE_PATH |"
            echo "| Environment | ${{ inputs.environment }} |"
            echo "| Status | Passed |"
            echo ""
            echo "TFLint completed successfully with no blocking issues."
          } >> $GITHUB_STEP_SUMMARY
