name: HCL Tf Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      working_directory:
        description: "Terraform working directory"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  terraform-apply:
    runs-on: self-hosted
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHUB_TOKEN }}" | podman login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Pull Image (only if not present)
        run: |
          if ! podman image exists ghcr.io/aayushsinghal1984/ulseworkflowcontainer:latest; then
            echo "Image not found locally, pulling..."
            podman pull ghcr.io/aayushsinghal1984/ulseworkflowcontainer:latest
          else
            echo "Image already exists locally, skipping pull."
          fi

      - name: Get Latest Plan Run ID
        id: get_run
        run: |
          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/hclplan.yml/runs?status=success&per_page=1" \
            | jq -r '.workflow_runs[0].id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: No successful Plan run found"
            exit 1
          fi
          echo "Found Plan Run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ github.workspace }}/${{ inputs.working_directory }}
          github-token: ${{ secrets.GHUB_TOKEN }}
          run-id: ${{ steps.get_run.outputs.run_id }}

      - name: Verify Plan Files
        shell: bash
        run: |
          echo "Files in plan directory:"
          ls -lh "${{ github.workspace }}/${{ inputs.working_directory }}/"

          if [ ! -f "${{ github.workspace }}/${{ inputs.working_directory }}/tfplan" ]; then
            echo "ERROR: tfplan not found"
            exit 1
          fi
          echo "tfplan found — ready for apply"

      - name: Get OIDC Token
        id: oidc
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" \
            | jq -r '.value')
          echo "::add-mask::$OIDC_TOKEN"
          echo "oidc_token=$OIDC_TOKEN" >> $GITHUB_OUTPUT

      - name: Terraform Apply
        shell: bash
        run: |
          set -euo pipefail

          MODULE_PATH="${{ inputs.working_directory }}"
          MODULE_NAME="${{ inputs.working_directory }}"
          ENVIRONMENT="${{ inputs.environment }}"

          echo "-------------------------------------"
          echo "Running Terraform Apply"
          echo "-------------------------------------"
          echo "Working Directory: ${MODULE_PATH}"

          podman run --rm \
            -v "${{ github.workspace }}:/workspace:Z" \
            -w "/workspace/${MODULE_PATH}" \
            -e TF_TOKEN_app_terraform_io="${{ secrets.TF_API_TOKEN }}" \
            -e ARM_CLIENT_ID="${{ secrets.ARM_CLIENT_ID }}" \
            -e ARM_TENANT_ID="${{ secrets.ARM_TENANT_ID }}" \
            -e ARM_SUBSCRIPTION_ID="${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -e ARM_USE_OIDC=true \
            -e ARM_OIDC_TOKEN="${{ steps.oidc.outputs.oidc_token }}" \
            --entrypoint /bin/sh \
            ghcr.io/aayushsinghal1984/ulseworkflowcontainer:latest \
            -c "
              echo 'Terraform Version'
              terraform version

              echo 'Terraform Init'
              terraform init -input=false -no-color

              echo 'Terraform Apply'
              terraform apply -input=false -no-color tfplan
            "

          echo ""
          echo "Deployment completed successfully"

          {
            echo "# Terraform Apply Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Module | ${MODULE_NAME} |"
            echo "| Environment | ${ENVIRONMENT} |"
            echo "| Status | Infrastructure Applied |"
            echo ""
            echo "Infrastructure changes applied successfully."
          } >> "$GITHUB_STEP_SUMMARY"