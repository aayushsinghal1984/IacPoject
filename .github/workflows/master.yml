name: "Master Terraform CI/CD Pipeline"



on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

      organization:
        description: "Terraform Cloud organization name"
        required: true
        type: string
        default: "HCLIT"

      working_directory:
        description: "Terraform working directory (default: repo root)"
        required: false
        default: "."
        type: string

      skip_bootstrap:
        description: "Skip TF Cloud Bootstrap? (set true if workspace already exists)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      skip_apply:
        description: "Skip Terraform Apply? (plan-only run)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"


jobs:

  # ── Stage 1: Bootstrap ──────────────────────────────────
  bootstrap:
    name: "Stage 1 · TF Cloud Bootstrap"
    if: ${{ inputs.skip_bootstrap == 'false' }}
    uses: aayuORG1/project1/.github/workflows/docker-tf-cloud-bootstrap.yml@main
    with:
      environment: ${{ inputs.environment }}
      organization: ${{ inputs.organization }}
      working_directory: ${{ inputs.working_directory }}
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

  # ── Stage 2: Lint ────────────────────────────────────────
  lint:
    name: "Stage 2 · TFLint"
    needs: [bootstrap]
    if: always() && !failure() && !cancelled()
    uses: aayuORG1/project1/.github/workflows/docker-tflint.yml@main
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
      
   # ── Stage 2a: TFSec (parallel with OPA) ─────────────────
  tfsec:
    name: "Stage 5a · TFSec Scan"
    needs: [bootstrap]
    if: always() && !failure() && !cancelled()
    uses: aayuORG1/project1/.github/workflows/docker-tfsec.yml@main
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}

  # ── Stage 3: Test ────────────────────────────────────────
  test:
    name: "Stage 3 · Terraform Test"
    needs: [lint]
    if: always() && !failure() && !cancelled()
    uses: aayuORG1/project1/.github/workflows/docker-tftest-pipeline.yml@main

    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── Stage 4: Plan ────────────────────────────────────────
  plan:
    name: "Stage 4 · Terraform Plan"
    needs: [test]
    if: always() && !failure() && !cancelled()
    uses: aayuORG1/project1/.github/workflows/docker-tf-plan.yml@main


    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

 

  # ── Stage 5b: OPA Policy (parallel with TFSec) ──────────
  opa:
    name: "Stage 5b · OPA Policy Evaluation"
    needs: [plan]
    if: always() && !failure() && !cancelled()
    uses: aayuORG1/project1/.github/workflows/docker-OPA-Policy.yml@main
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 6: Apply ───────────────────────────────────────
  apply:
    name: "Stage 6 · Terraform Apply"
    needs: [tfsec, opa]
    if: |
      always() &&
      !failure() &&
      !cancelled() &&
      inputs.skip_apply == 'false'
    uses: aayuORG1/project1/.github/workflows/docker-tf-apply.yml@main
    secrets: inherit
