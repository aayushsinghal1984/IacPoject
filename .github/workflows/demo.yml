name: 'New demo'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      working_directory:
        description: "Terraform working directory (relative to repo root)"
        required: false
        default: "."
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  terraform:
    name: 'image download'
    runs-on: self-hosted
    container:
      image: hashicorp/terraform:1.9.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4    
        
      - name: Debug Secret
        run: |
          if [ -z "${{ secrets.TF_API_TOKEN }}" ]; then
            echo "Secret is empty!"
          else
            echo "Secret is loaded (length: ${#SECRET_VAL})"
          fi
        env:
          SECRET_VAL: ${{ secrets.TF_API_TOKEN }}
        
      - name: Terraform Init
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl
          terraform init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}}

      - name: Terraform Plan
        working-directory: ${{ github.event.inputs.working_directory }}
        run: terraform plan -input=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ github.event.inputs.working_directory }}
        run: terraform apply -auto-approve -input=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
