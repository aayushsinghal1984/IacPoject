name: 'New demo'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      working_directory:
        description: "Terraform working directory (relative to repo root)"
        required: false
        default: "."
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  terraform:
    name: 'create workspace'
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ${{ github.event.inputs.working_directory }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4 

        
      - name: Internet Connectivity Check
        run: curl -v https://registry.terraform.io
  
        
      - name: Terraform Init
        run: |
          # Clean up existing terraform configuration and lock files
          rm -rf .terraform
          rm -f .terraform.lock.hcl
          # Initialize terraform in the correct directory
          terraform init
        env:
          # Using the correct secret without extra syntax
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Plan
        run: terraform plan -input=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
