name: "docker tf-apply pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        type: string
        default: "."

permissions:
  contents: read
  actions: read

jobs:
  apply:
    runs-on: self-hosted

    container:
      image: hashicorp/terraform:1.9.0

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: ${{ inputs.environment }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_USE_OIDC: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          apt-get update && apt-get install -y gh jq curl

      - name: Get latest plan run & download artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          RUN_ID=$(gh run list \
            --workflow "terraform-plan" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "Run ID: $RUN_ID"
          gh run download "$RUN_ID" \
            --name "tfplan-${{ inputs.environment }}" \
            --dir ./artifact
          echo "Downloaded files:"
          find ./artifact -type f

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply 
        run: |
          set -e
          PLAN_FILE=$(find ./artifact -name "tfplan" | head -n 1)
          if [ -z "$PLAN_FILE" ]; then
            echo " tfplan not found"
            exit 1
          fi
          echo "Using plan: $PLAN_FILE"
          terraform apply -input=false -auto-approve "$PLAN_FILE"

      - name: Summary
        if: always()
        run: |
          echo "# Terraform Apply Completed" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
