name: "docker tf-apply Pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Terraform folder path"
        default: "./network/env"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  apply:
    runs-on: self-hosted


    container:
      image: hashicorp/terraform:1.9.0  

    steps:
      - name: Install required tools
        run: |
          apk add --no-cache git curl jq bash unzip
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "https://cli.github.com/packages" > /etc/apk/repositories 2>/dev/null || true
          curl -sSL https://github.com/cli/cli/releases/latest/download/gh_2.95.0_linux_amd64.tar.gz -o gh.tar.gz
          tar -xzf gh.tar.gz
          mv gh*/bin/gh /usr/local/bin/gh

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory '*'

          RUN_ID=$(gh run list \
            --workflow "docker-init.yml" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: No successful run found"
            exit 1
          fi

          echo "Using Run ID: $RUN_ID"

          gh run download $RUN_ID \
            --name "tfplan-json-${{ inputs.environment }}"

      - name: Verify workspace
        run: |
          ls -R ${{ inputs.working_directory }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform apply -auto-approve


      - name: Job Summary
        if: always()
        run: |
          echo "# Terraform Apply Completed" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "Directory: ${{ inputs.working_directory }}" >> $GITHUB_STEP_SUMMARY
