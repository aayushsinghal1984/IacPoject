name: "docker tf-apply pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, qa, prod]

      working_directory:
        description: "Terraform working directory"
        required: false
        default: "network/env"

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  terraform-apply:
    runs-on: self-hosted

    container:
      image: hashicorp/terraform:1.9.0

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: ${{ inputs.environment }}

      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_USE_OIDC: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------
      # DOWNLOAD ARTIFACT (PLAN)
      # -----------------------------
      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-json-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}

      - name: Verify downloaded files
        run: |
          echo "Listing working directory:"
          ls -R ${{ inputs.working_directory }}

      # -----------------------------
      # TERRAFORM INIT
      # -----------------------------
      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -input=false

      # -----------------------------
      # TERRAFORM APPLY
      # -----------------------------
      - name: Terraform Apply
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -e

          echo "Checking tfplan file..."
          ls -lah

          if [ ! -f "tfplan" ]; then
            echo "ERROR: tfplan file not found!"
            exit 1
          fi

          terraform apply -input=false -auto-approve tfplan

      # -----------------------------
      # SUMMARY
      # -----------------------------
      - name: GitHub Step Summary
        if: always()
        run: |
          echo "# Terraform Apply Completed" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "Directory: ${{ inputs.working_directory }}" >> $GITHUB_STEP_SUMMARY
