name: " docker main tfcloud-bootstrap-pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

      organization:
        description: "Terraform Cloud organization"
        required: true
        type: string

      workspace_name:
        description: "Terraform Cloud workspace name"
        required: true
        type: string

      working_directory:
        description: "Terraform working directory"
        required: false
        default: "."
        type: string

jobs:
  terraform-cloud-bootstrap:
    runs-on: self-hosted

    container:
      image: ubuntu:latest

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_VAR_tfe_token: ${{ secrets.TF_API_TOKEN }}
      TF_VAR_workspace_name: ${{ inputs.workspace_name }}

    steps:
      - name: Install Packages
        run: |
          apt-get update
          apt-get install -y wget unzip curl git

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          TERRAFORM_VERSION=1.13.0
          wget https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip
          unzip terraform_${TERRAFORM_VERSION}_linux_amd64.zip
          mv terraform /usr/local/bin/
          terraform version


      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan \
            -var="environment=${{ inputs.environment }}" \
            -var="organization=${{ inputs.organization }}" \
            -var="workspace_name=${{ inputs.workspace_name }}"

      - name: Terraform Apply
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            tfplan
