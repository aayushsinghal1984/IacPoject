name: "Docker OPA Pipeline"
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Folder where .tf files exist"
        default: "."
        type: string

jobs:
  opa-validation:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OPA inside Container
        run: |
          docker run --rm \
          --user $(id -u):$(id -g) \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace/${{ inputs.working_directory }} \
          ghcr.io/aayushsinghal1984/toolimgae:v1 \
          /bin/bash -c "opa eval --data /workspace/policies --input tfplan.json --format json 'data.terraform' > opa-results.json"


      - name: Upload OPA results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opa-results-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/opa-results.json
