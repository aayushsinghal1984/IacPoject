name: "Docker OPA Pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Folder where tfplan.json exists"
        default: "."
        type: string

permissions:
  actions: read
  contents: read

jobs:
  opa:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      - name: Install Packages and GitHub CLI
        run: |
          apt-get update
          apt-get install -y curl tar git
          # Install GitHub CLI
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update
          apt-get install -y gh

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Artifact and Evaluate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. FIX: Directory ko safe mark karein (Dubious ownership error fix)
          git config --global --add safe.directory '*'
          
          # 2. Fetch Latest Successful Run ID for Terraform Workflow
          # IMPORTANT: "terraform-init.yml" ko apni actual Terraform workflow filename se badlein
          RUN_ID=$(gh run list --workflow "terraform-init.yml" --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          
          if [ -z "$RUN_ID" ]; then
            echo "Error: No successful Terraform runs found. Check if your workflow filename is correct."
            exit 1
          fi
          
          echo "Using Terraform Run ID: $RUN_ID"
          
          # 3. Download Artifact
          gh run download $RUN_ID --name "tfplan-json-${{ inputs.environment }}"
          
          # 4. Install OPA
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          mv opa /usr/local/bin/
          
          # 5. Evaluate Policy
          echo "Running OPA Evaluation..."
          # File verify karein
          ls -l tfplan.json
          opa eval -d policies -i tfplan.json "data.azure.naming"
