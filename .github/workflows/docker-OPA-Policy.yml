name: "Docker OPA Pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Folder where .tfplan.json exists"
        default: "."
        type: string

jobs:
  opa:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04 # Latest ki jagah specific version best practice hai
    steps:
      - name: Install Packages
        run: |
          apt-get update && apt-get install -y curl tar git
          
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download tfplan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-json-dev # Uploaded file ka naam yahi hai
          path: ./downloaded_artifacts # Ek specific folder mein download karte hain

      - name: Verify Downloaded File
        run: |
          echo "Listing files in downloaded_artifacts folder:"
          ls -R ./downloaded_artifacts

      - name: Evaluate Policy
        run: |
          # File yahan se pick karenge
          opa eval \
            --data policies \
            --input ./downloaded_artifacts/tfplan.json \
            --format json \
            "data.azure.naming" > opa-results.json
      - name: Generate Summary
        if: always()
        run: |
          echo "### OPA Validation Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f "opa-results.json" ]; then
            echo " OPA evaluation completed successfully." >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat opa-results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "OPA results file not found." >> $GITHUB_STEP_SUMMARY
          fi
