name: "Docker OPA Pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Folder where tfplan.json exists"
        default: "."
        type: string      

permissions:
  actions: read
  contents: read

jobs:
  opa:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      - name: Install Packages and GitHub CLI
        run: |
          apt-get update
          apt-get install -y curl tar git
          # Install GitHub CLI
          curl -sSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update
          apt-get install -y gh jq

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Artifact and Evaluate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Directory Permissions Fix
          git config --global --add safe.directory '*'
          
          # 2. Fetch Latest Successful Run ID for docker-init.yml
          RUN_ID=$(gh run list --workflow "docker-init.yml" --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          
          if [ -z "$RUN_ID" ]; then
            echo "Error: No successful run found for 'docker-init.yml'."
            exit 1
          fi
          
          echo "Using Run ID: $RUN_ID"
          
          # 3. Download Artifact
          gh run download $RUN_ID --name "tfplan-json-${{ inputs.environment }}"
          
          # 4. Install OPA
          curl -sL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          mv opa /usr/local/bin/
          
          # 5. Scan Details and Evaluation
          echo "------------------------------------------"
          echo "OPA Scanning Directory: $(pwd)"
          echo "Scanning File: $(ls -l tfplan.json)"
          echo "Policy Directory: ./policies"
          echo "------------------------------------------"
          
          echo "Running OPA Evaluation..."
          OPA_JSON=$(opa eval -d policies -i tfplan.json "data.azure.naming")
          
          # 6. Log JSON Result
          echo "$OPA_JSON" | jq '.'
          
          # 7. Add Results to GitHub Job Summary
          echo "# OPA Evaluation Results" >> $GITHUB_STEP_SUMMARY
          echo "### Scan Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Scan Path:** $(pwd)" >> $GITHUB_STEP_SUMMARY
          echo "- **Target File:** tfplan.json" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$OPA_JSON" | jq '.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # 8. Check for Violations
          VIOLATIONS=$(echo "$OPA_JSON" | jq '.result[0].expressions[0].value | length')
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error:: OPA Policy Violations found: $VIOLATIONS"
            exit 1
          fi
