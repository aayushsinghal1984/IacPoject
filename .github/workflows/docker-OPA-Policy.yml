name: "Docker OPA Pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Folder where .tfplan.json exists"
        default: "."
        type: string

jobs:
  opa-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Ab image pull karein
      - name: Pull OPA Image
        run: docker pull ghcr.io/aayushsinghal1984/toolimgae:v1

      - name: Pull OPA Image
        run: docker pull ghcr.io/aayushsinghal1984/toolimgae:v1

      - name: Download tfplan JSON artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-json-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}


      - name: Run OPA inside Container
        run: |
          docker run --rm \
          --user $(id -u):$(id -g) \
          -v ${{ github.workspace }}:/workspace \
          ghcr.io/aayushsinghal1984/toolimgae:v1 \
          /bin/bash -c "opa eval --data /workspace/policies --input /workspace/${{ inputs.working_directory }}/tfplan.json --format json 'data.terraform' > /workspace/${{ inputs.working_directory }}/opa-results.json"


      - name: Generate OPA Summary
        if: always()
        run: |
          echo "### OPA Validation Results" >> $GITHUB_STEP_SUMMARY
          
          # Check karte hain ki result file bani hai ya nahi
          if [ -f "${{ inputs.working_directory }}/opa-results.json" ]; then
            echo " **OPA Evaluation successful.**" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat ${{ inputs.working_directory }}/opa-results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo " **OPA Results file not found.** Check the logs for container errors." >> $GITHUB_STEP_SUMMARY
          fi
