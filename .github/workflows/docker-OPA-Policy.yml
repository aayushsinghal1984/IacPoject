name: "Docker OPA Pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Folder where tfplan.json exists"
        default: "."
        type: string
permissions:
  actions: read 
  contents: read
jobs:
  opa:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      - name: Install Packages
        run: |
          apt-get update
          apt-get install -y curl tar git
          
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-json-${{ inputs.environment }}
          # Agar aap manual trigger kar rahe hain, toh yahan specific run-id dena hoga
          # Ya agar aap ek hi workflow mein jobs use kar rahe hain, toh iski zarurat nahi.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          mv opa /usr/local/bin/
          opa version
          
      - name: Evaluate Policy
        run: |
          echo "Checking files in directory:"
          ls -R
          opa eval -d policies -i tfplan.json "data.azure.naming"
