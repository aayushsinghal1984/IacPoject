name: "Docker OPA Pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Folder where tfplan.json exists"
        default: "."
        type: string      

permissions:
  actions: read
  contents: read

jobs:
  opa:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      - name: Install Packages and GitHub CLI
        run: |
          apt-get update
          apt-get install -y curl tar git
          # Install GitHub CLI
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update
          apt-get install -y gh

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Artifact and Evaluate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. FIX: Directory ko safe mark karein
          git config --global --add safe.directory '*'
          
          # 2. Dynamic Run ID Fetch: Latest success run uthao
          RUN_ID=$(gh run list --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          
          if [ -z "$RUN_ID" ]; then
            echo "Error: No successful runs found in this repository."
            exit 1
          fi
          
          echo "Using Run ID: $RUN_ID"
          
          # 3. Download Artifact
          gh run download $RUN_ID
          
          # 4. Install OPA
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          mv opa /usr/local/bin/
          
          # 5. Dynamic Path Selection
          PLAN_FILE=$(find . -name "tfplan.json" | head -n 1)
          
          if [ -z "$PLAN_FILE" ]; then
            echo "Error: tfplan.json not found in downloaded artifacts."
            exit 1
          fi
          
          echo "Found Plan File at: $PLAN_FILE"
          
          # 6. Evaluate Policy
          echo "Running OPA Evaluation..."
          opa eval -d policies -i "$PLAN_FILE" "data.azure.naming"
