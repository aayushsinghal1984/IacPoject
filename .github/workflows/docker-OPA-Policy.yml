name: "docker OPA Pipeline"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Folder where .tfplan.json exists"
        default: "."
        type: string

jobs:
  opa:
    runs-on:  ubuntu-latest
    
container:
      image: ubuntu:latest
    steps:
      - name: Install Packages
        run: |
          apt-get update
          apt-get install -y \
            curl \
            tar \
            git
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tfplan
      - name: Install OPA
        run: |
          curl -L -o opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          mv opa /usr/local/bin/
          opa version
      - name: Evaluate Policy
        run: |
          opa eval \
            -d policies \
            -i tfplan.json \
            "data.azure.naming"

      - name: Generate Summary
        if: always()
        run: |
          echo "### OPA Validation Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f "opa-results.json" ]; then
            echo "OPA evaluation completed successfully." >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat opa-results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo " OPA results file not found." >> $GITHUB_STEP_SUMMARY
          fi

     
