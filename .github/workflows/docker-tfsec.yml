
name: "TFSec - Secure Production Scan"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Terraform folder path"
        default: "."
        type: string

jobs:
  tfsec:
    name: "TFSec Scan (${{ inputs.environment }})"
    runs-on: self-hosted

    steps:
      #Checkout runs on HOST 
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Fix permissions (safe for self-hosted)
      - name: Fix workspace permissions
        run: |
          sudo chown -R $(id -u):$(id -g) $GITHUB_WORKSPACE || true

      # Debug workspace
      - name: Debug Folder
        run: |
          echo "Scanning directory: ${{ inputs.working_directory }}"
          ls -R "${{ inputs.working_directory }}"

      # Run tfsec inside container (NO checkout inside container)
      - name: Run TFSec Scan (Container)
        uses: docker://aquasec/tfsec:v1.28
        with:
          args: >
            ${{ inputs.working_directory }}
            --format json
            --soft-fail
            --out tfsec-report.json

      # Upload artifact (important for production)
      - name: Upload TFSec Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-report
          path: tfsec-report.json

      # GitHub Summary UI
      - name: TFSec Summary
        if: always()
        run: |
          echo "## TFSec Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "tfsec-report.json" ]; then
            echo "### Top 50 lines of report" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            head -n 50 tfsec-report.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo " No report generated" >> $GITHUB_STEP_SUMMARY
          fi
