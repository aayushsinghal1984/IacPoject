name: "Docker TFSec"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, qa, prod]
        required: true
      working_directory:
        description: "Folder where .tf files exist (e.g., network/env)"
        default: "."
        type: string

jobs:
  tfsec:
    name: "TFSec (${{ inputs.environment }})"
    runs-on: self-hosted
    container:
      image: aquasec/tfsec:v1.28     
      options: --user 1001 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Folder
        run: |
          echo "Scanning directory: ${{ inputs.working_directory }}"
          ls -R "${{ inputs.working_directory }}"

      - name: TFSec Scan
        run: |
          tfsec "${{ inputs.working_directory }}" \
            --format json \
            --soft-fail \
            --out tfsec-report.json

      - name: TFSec Summary (GitHub Step Summary)
        if: always()
        run: |
          echo "## 🔍 TFSec Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
      
          if [ -f "tfsec-report.json" ]; then
            echo "###  JSON Report Preview" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            head -n 50 tfsec-report.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo " No report file generated." >> $GITHUB_STEP_SUMMARY
          fi

    
